services:
  api:
    build:
      context: ./api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URL=mongodb://database:27017/tp3
    depends_on:
      - database

  database:
    image: mongo
    container_name: tp3-mongo
    volumes:
      - database_data:/data/db
    ports:
      - "27017:27017"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./client/dist:/usr/share/nginx/html
    depends_on:
      - api

volumes:
  database_data: