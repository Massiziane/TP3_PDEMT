services:
  client:
    build:
      context: ./client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000/api
  api:
      build:
        context: ./api
      ports:
        - "5000:5000"
      volumes:
        - ./api:/app
        - /app/node_modules
      environment:
        - PORT=5000
