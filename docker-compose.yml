services:
  client:
    build:
      context: ./client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - api

  api:
    build:
      context: ./api
    ports:
      - "5000:5000"
    volumes:
      - ./api:/app
      - /app/node_modules
    environment:
      - PORT=5000
      - MONGO_URL=mongodb://database:27017/tp3
    depends_on:
      - database

  database:
    image: mongo
    container_name: tp3-mongo
    ports:
      - "27017:27017"
    volumes:
      - database_data:/data/db

volumes:
  database_data: